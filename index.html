<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face & Hand</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        #input_video {
            display: none;
        }

        #output_canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: sans-serif;
            font-size: 24px;
            z-index: 10;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 10px;
        }

        .status {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-family: sans-serif;
            font-size: 14px;
            z-index: 10;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
        }

        .error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff4444;
            font-family: sans-serif;
            font-size: 18px;
            z-index: 10;
            background: rgba(0,0,0,0.9);
            padding: 20px;
            border-radius: 10px;
            display: none;
        }
    </style>

    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div class="loading" id="loadingText">
        🔄 Develop by januar ...<br>
        <small style="font-size: 14px; color: #aaa;">Mohon tunggu 5-10 detik</small>
    </div>

    <div class="status" id="statusText">
        📊 Status: Menunggu kamera...
    </div>

    <div class="error" id="errorText"></div>

    <div class="container">
        <video id="input_video" playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingText = document.getElementById('loadingText');
        const statusText = document.getElementById('statusText');
        const errorText = document.getElementById('errorText');

        let faceCount = 0;
        let handCount = 0;
        let frameCount = 0;

        
        function showError(message) {
            errorText.style.display = 'block';
            errorText.innerHTML = `❌ ${message}`;
            loadingText.style.display = 'none';
        }

        
        function updateStatus(message) {
            statusText.innerHTML = `📊 Status: ${message}`;
        }

        
        function onResults(results) {
            frameCount++;
            
            
            if (frameCount > 10) {
                loadingText.style.display = 'none';
            }
            
            
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
            
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            
            faceCount = results.multiFaceLandmarks ? results.multiFaceLandmarks.length : 0;
            handCount = results.multiHandLandmarks ? results.multiHandLandmarks.length : 0;
            updateStatus(`👤 Wajah: ${faceCount} | ✋ Tangan: ${handCount} | 🎬 Frame: ${frameCount}`);
            if (hands.length === 2) {
                    const h1 = hands[0];
                    const h2 = hands[1];
                    const distIndex = getDistance(h1[8], h2[8]); // Jarak antar telunjuk
                    const distThumb = getDistance(h1[4], h2[4]); // Jarak antar jempol

                    if (distIndex < 0.15 && distThumb < 0.15) {
                        canvasCtx.font = "bold 80px Arial";
                        canvasCtx.fillStyle = "#ff007a";
                        canvasCtx.textAlign = "center";
                        canvasCtx.fillText("LOVE 🫶", canvasElement.width / 2, canvasElement.height / 2);
                    }
                }

                hands.forEach((landmarks) => {
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#ff007a', lineWidth: 3});
                    
                    const thumb = isUp(landmarks, 4, 3);
                    const index = isUp(landmarks, 8, 6);
                    const middle = isUp(landmarks, 12, 10);
                    const ring = isUp(landmarks, 16, 14);
                    const pinky = isUp(landmarks, 20, 18);

                    let gesture = "";
                    let color = "#fff";

                    // Logika Gestur Baru
                    // 🫰 Korean Heart: Jempol dan telunjuk bersilangan/dekat, sisanya menekuk
                    const distKorean = getDistance(landmarks[4], landmarks[8]);
                    
                    if (distKorean < 0.05 && !middle && !ring && !pinky) {
                        gesture = "SARANGHAEYO 🫰"; color = "#ff4d94";
                    } else if (thumb && index && middle && ring && pinky) {
                        gesture = "HALO! 🖐️"; color = "#00ffcc";
                    } else if (index && middle && !ring && !pinky && !thumb) {
                        gesture = "PEACE ✌️"; color = "#ff00ff";
                    } else if (index && pinky && !middle && !ring && !thumb) {
                        gesture = "ROCK ON! 🤘"; color = "#ffcc00";
                    } else if (thumb && !index && !middle && !ring && !pinky) {
                        gesture = "GTU 👍"; color = "#00ff00";
                    } else if (middle && !index && !ring && !pinky && !thumb) {
                        gesture = "WARNING! 🖕"; color = "#ff0000";
                    }

                    if (gesture) {
                        canvasCtx.font = "bold 50px Arial";
                        canvasCtx.fillStyle = color;
                        const x = landmarks[0].x * canvasElement.width;
                        const y = landmarks[0].y * canvasElement.height;
                        canvasCtx.fillText(gesture, x, y - 60);
                    }
                });

            
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                console.log('✅ Face detected:', results.multiFaceLandmarks.length);
                
                for (const landmarks of results.multiFaceLandmarks) {
                    
                    drawConnectors(canvasCtx, landmarks, FACEMESH_TESSELATION, {
                        color: '#00FF0080',
                        lineWidth: 0.5
                    });
                    
                    
                    drawLandmarks(canvasCtx, landmarks, {
                        color: '#FF0000',
                        lineWidth: 1,
                        radius: 1
                    });
                }
            } else {
                console.log('❌ No face detected');
            }

            
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                console.log('✅ Hand detected:', results.multiHandLandmarks.length);
                
                for (const landmarks of results.multiHandLandmarks) {
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {
                        color: '#00FFFF',
                        lineWidth: 3
                    });
                    drawLandmarks(canvasCtx, landmarks, {
                        color: '#00FFFF',
                        lineWidth: 2,
                        radius: 2
                    });
                }
            }
            
            canvasCtx.restore();
        }

        
        const faceMesh = new FaceMesh({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
            }
        });

        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5,
            modelComplexity: 1
        });

        faceMesh.onResults(onResults);

        
        const hands = new Hands({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults(onResults);

        
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                try {
                    await faceMesh.send({image: videoElement});
                    await hands.send({image: videoElement});
                } catch (error) {
                    console.error('Error sending frame:', error);
                }
            },
            width: 1280,
            height: 720,
            facingMode: 'user'
        });

        
        camera.start()
            .then(() => {
                console.log('✅ Camera started successfully');
                updateStatus('📷 Kamera aktif - Hadapkan wajah ke kamera');
            })
            .catch(error => {
                console.error('❌ Camera start error:', error);
                showError('Gagal mengakses kamera!<br><br>1. Pastikan izin kamera diberikan<br>2. Coba browser lain (Chrome/Edge)<br>3. Pastikan tidak ada aplikasi lain yang menggunakan kamera');
            });

        
        console.log('🚀 Face & Hand Tracking App Started');
        console.log('📱 MediaPipe Libraries Loaded');
    </script>
</body>
</html>
